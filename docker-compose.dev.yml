services:
  postgres:
    image: postgres:16
    container_name: mtv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mtv
      POSTGRES_PASSWORD: mtv123
      POSTGRES_DB: mtv_dev
    ports: 
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: mtv-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mtv.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
